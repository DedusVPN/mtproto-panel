# Пример reverse-proxy Nginx → панель (uvicorn/docker) на 127.0.0.1:8765
# Без Upgrade/Connection браузер показывает «WebSocket: ошибка соединения» при развёртывании / журнале.

upstream telemt_panel {
    server 127.0.0.1:8765;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name panel.example.com;

    # ssl_certificate     /etc/letsencrypt/live/panel.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/panel.example.com/privkey.pem;

    location / {
        proxy_pass http://telemt_panel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # Долгий SSH-деплой
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
