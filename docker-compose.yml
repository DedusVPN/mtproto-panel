services:
  panel:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: free-tg-mtproxy-panel:local
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Иначе entrypoint не сможет сбросить uid до panel (1000) после копирования секретов
    cap_add:
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64M
    environment:
      PANEL_AUTH_ENABLED: "true"
      PANEL_JWT_SECRET_FILE: /run/secrets/panel_jwt_secret
      PANEL_ADMIN_PASSWORD_HASH_FILE: /run/secrets/panel_admin_password_hash
      # Доступ по IP и HTTP без TLS — иначе cookie сессии не работают
      PANEL_COOKIE_SECURE: "false"
      PANEL_TRUST_FORWARDED_PROTO: "false"
      PANEL_EXPOSE_OPENAPI: "false"
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8765"
    secrets:
      - panel_jwt_secret
      - panel_admin_password_hash
    volumes:
      - panel_data:/app/data
    ports:
      - "8765:8765"

secrets:
  panel_jwt_secret:
    file: ./secrets/panel_jwt_secret
  panel_admin_password_hash:
    file: ./secrets/panel_admin_password_hash

volumes:
  panel_data:
